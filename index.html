<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lenz Photography | Professional Portfolio & Booking</title>
    <meta name="description" content="Professional photography portfolio and booking system for local photographers in Uganda. Specialized in portraits and events.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fcfcfc',
                            100: '#f5f5f5',
                            800: '#1e1e1e',
                            900: '#111111',
                            accent: '#d4af37', /* Gold/premium accent */
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-brand-50 text-brand-800 antialiased selection:bg-brand-accent selection:text-white">

    <!-- Header Navigation -->
    <header class="fixed w-full top-0 z-50 transition-all duration-300" id="main-header">
        <div class="absolute inset-0 bg-white/80 backdrop-blur-md border-b border-gray-100 shadow-sm" id="header-bg"></div>
        <div class="container mx-auto px-4 relative">
            <div class="flex items-center justify-between h-20">
                <!-- Logo -->
                <a href="#" class="text-2xl font-serif font-bold tracking-tight z-10 flex items-center gap-2">
                    <i class="fa-solid fa-camera-retro text-brand-accent"></i>
                    <span>Lenz<span class="text-brand-accent">.</span></span>
                </a>
                
                <!-- Desktop Nav -->
                <nav class="hidden md:flex space-x-8 z-10">
                    <a href="#home" class="text-sm font-medium hover:text-brand-accent transition-colors">Home</a>
                    <a href="#portfolio" class="text-sm font-medium hover:text-brand-accent transition-colors">Portfolio</a>
                    <a href="#booking" class="text-sm font-medium hover:text-brand-accent transition-colors">Book a Session</a>
                </nav>

                <!-- Mobile Menu Button -->
                <button class="md:hidden z-10 text-brand-800 p-2" id="mobile-menu-btn" aria-label="Toggle Menu">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
            </div>
        </div>
        
        <!-- Mobile Nav Menu -->
        <div class="md:hidden absolute top-full left-0 w-full bg-white shadow-lg hidden flex-col transition-all duration-300 transform origin-top" id="mobile-nav">
            <a href="#home" class="p-4 border-b border-gray-100 text-center hover:bg-gray-50 hover:text-brand-accent transition-colors mobile-link">Home</a>
            <a href="#portfolio" class="p-4 border-b border-gray-100 text-center hover:bg-gray-50 hover:text-brand-accent transition-colors mobile-link">Portfolio</a>
            <a href="#booking" class="p-4 text-center hover:bg-gray-50 hover:text-brand-accent transition-colors mobile-link">Book a Session</a>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Hero Section -->
        <section id="home" class="relative h-screen flex items-center justify-center overflow-hidden">
            <!-- Background Image -->
            <div class="absolute inset-0 z-0">
                <img src="https://images.unsplash.com/photo-1531123897727-8f129e1bf98c?q=80&w=2070&auto=format&fit=crop" alt="Hero Background" class="w-full h-full object-cover object-center" />
                <div class="absolute inset-0 bg-brand-900/60 mix-blend-multiply"></div>
                <!-- Gradient Overlay -->
                <div class="absolute inset-0 bg-gradient-to-t from-brand-900 via-transparent to-transparent"></div>
            </div>

            <!-- Hero Content -->
            <div class="container mx-auto px-4 relative z-10 text-center text-white mt-16">
                <h1 class="text-5xl md:text-7xl font-serif font-bold mb-6 drop-shadow-lg opacity-0 translate-y-8 animate-[fadeUp_1s_ease-out_forwards]">
                    Capturing Life's <br/> <span class="text-brand-accent italic">Finest Moments</span>
                </h1>
                <p class="text-lg md:text-xl text-gray-200 mb-10 max-w-2xl mx-auto font-light drop-shadow opacity-0 translate-y-8 animate-[fadeUp_1s_ease-out_0.3s_forwards]">
                    Premium portrait and event photography based in Uganda. We turn your fleeting moments into timeless art.
                </p>
                <div class="flex flex-col sm:flex-row items-center justify-center gap-4 opacity-0 translate-y-8 animate-[fadeUp_1s_ease-out_0.6s_forwards]">
                    <a href="#portfolio" class="px-8 py-4 bg-transparent border border-white text-white font-medium rounded-sm hover:bg-white hover:text-brand-900 transition-all duration-300 w-full sm:w-auto">
                        View Portfolio
                    </a>
                    <a href="#booking" class="px-8 py-4 bg-brand-accent text-white font-medium rounded-sm hover:bg-yellow-600 transition-all duration-300 w-full sm:w-auto shadow-lg shadow-brand-accent/30">
                        Book a Session
                    </a>
                </div>
            </div>
            
            <!-- Scroll Indicator -->
            <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-10 animate-bounce opacity-0 animate-[fadeIn_1s_ease-out_1.5s_forwards]">
                <a href="#portfolio" class="text-white/70 hover:text-brand-accent transition-colors" aria-label="Scroll down">
                    <i class="fa-solid fa-chevron-down text-2xl"></i>
                </a>
            </div>
        </section>
    </main>

    <!-- Custom JS -->
    <script src="js/app.js"></script>
</body>
</html>
